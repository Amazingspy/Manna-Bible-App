<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: var(--font-sans, "Anthropic Sans", sans-serif);
            background: transparent;
            color: var(--color-text-primary, #222);
            overflow-x: auto
        }

        h2.sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0
        }

        .wrap {
            min-width: 900px;
            padding: 12px 16px 32px
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
            margin-bottom: 16px;
            font-size: 12px
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
            flex-shrink: 0
        }

        .section-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text-secondary, #666);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin: 18px 0 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--color-border-tertiary, #ddd)
        }

        svg.tree {
            width: 100%;
            overflow: visible;
            display: block
        }

        /* Node colors by category */
        .n-adam {
            fill: #EEEDFE;
            stroke: #534AB7
        }

        .n-pre {
            fill: #E6F1FB;
            stroke: #185FA5
        }

        .n-post {
            fill: #E1F5EE;
            stroke: #0F6E56
        }

        .n-abr {
            fill: #FAEEDA;
            stroke: #854F0B
        }

        .n-jacob {
            fill: #FAECE7;
            stroke: #993C1D
        }

        .n-tribe {
            fill: #EAF3DE;
            stroke: #3B6D11
        }

        .n-judge {
            fill: #F1EFE8;
            stroke: #5F5E5A
        }

        .n-king {
            fill: #FBEAF0;
            stroke: #993556
        }

        .n-nt {
            fill: #FCEBEB;
            stroke: #A32D2D
        }

        .n-female {
            fill: #fff0f6;
            stroke: #c44b80
        }

        .n-god {
            fill: #fffde7;
            stroke: #b8860b;
            stroke-width: 2
        }

        .n-special {
            fill: #fff9e6;
            stroke: #c8a000;
            stroke-dasharray: 4 2
        }

        text.label {
            font-size: 11px;
            font-weight: 500;
            text-anchor: middle;
            dominant-baseline: central;
            fill: var(--color-text-primary, #222)
        }

        text.sub {
            font-size: 9px;
            text-anchor: middle;
            dominant-baseline: central;
            fill: var(--color-text-secondary, #666)
        }

        text.ref {
            font-size: 8.5px;
            text-anchor: middle;
            dominant-baseline: central;
            fill: #888;
            font-style: italic
        }

        text.sect {
            font-size: 10px;
            font-weight: 500;
            fill: var(--color-text-secondary, #777);
            text-anchor: middle
        }

        line.edge,
        path.edge {
            stroke: #aaa;
            stroke-width: 1;
            fill: none;
            marker-end: url(#arr)
        }

        line.edge-m,
        path.edge-m {
            stroke: #c44b80;
            stroke-width: 1;
            fill: none;
            stroke-dasharray: 3 2;
            marker-end: url(#arr-m)
        }

        line.edge-k,
        path.edge-k {
            stroke: #993556;
            stroke-width: 1;
            fill: none;
            marker-end: url(#arr-k)
        }

        line.edge-t,
        path.edge-t {
            stroke: #3B6D11;
            stroke-width: 1;
            fill: none;
            marker-end: url(#arr-t)
        }

        line.edge-n,
        path.edge-n {
            stroke: #A32D2D;
            stroke-width: 1;
            fill: none;
            marker-end: url(#arr-n)
        }

        line.edge-s {
            stroke: #b8860b;
            stroke-width: 1.5;
            stroke-dasharray: 5 2;
            fill: none;
            marker-end: url(#arr-s)
        }

        .node-g {
            cursor: pointer
        }

        .node-g:hover rect {
            opacity: .82
        }

        rect.box {
            rx: 6;
            stroke-width: 1
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: transparent;
                /* Keep primary text white for text outside nodes (like title, section text) */
                --color-text-primary: #f8fafc;
                --color-text-secondary: #cbd5e1;
                --color-border-tertiary: #334155;
            }
            
            /* Keep text inside the pastel boxes dark */
            text.label { fill: #1e293b !important; }
            text.sub { fill: #475569 !important; }
            text.ref { fill: #64748b !important; }
            text.sect { fill: #cbd5e1 !important; }
            
            /* Make connection lines a bit darker/clearer against the dark background */
            line.edge, path.edge { stroke: #64748b; }
            line.edge-m, path.edge-m { stroke: #be185d; }
            line.edge-k, path.edge-k { stroke: #be123c; }
            line.edge-t, path.edge-t { stroke: #4d7c0f; }
            line.edge-n, path.edge-n { stroke: #b91c1c; }
            line.edge-s { stroke: #b45309; }
            
            /* Slightly thicker boxes for contrast */
            rect.box { stroke-width: 1.5; }
            
            #arr path { stroke: #64748b; }
            #arr-m path { stroke: #be185d; }
            #arr-k path { stroke: #be123c; }
            #arr-t path { stroke: #4d7c0f; }
            #arr-n path { stroke: #b91c1c; }
            #arr-s path { stroke: #b45309; }
        }
    </style>
</head>

                document.getElementById('info-name').textContent = name;
